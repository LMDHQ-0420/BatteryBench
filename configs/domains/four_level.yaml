data:
  # 训练池：batch 1-7,10 (HUST) + b1-b3 (MATR) + CALB + XJTU + 其他域，按 cathode_material 分层 8% 作 val
  split_strategy: four_level
  val_ratio: 0.08

  # batch 8/9 (HUST) 和 b4 (MATR) 作为 L1/L2 测试集，从训练中排除
  exclude_pattern:
    - "HUST_[89]-*.pkl"
    - "MATR_b4*.pkl"

  train_dirs:
    - data/preprocessed/HUST          # LFP, batch 1-7,10 (batch 8/9 由 exclude_pattern 排除)
    - data/preprocessed/MATR          # LFP, b1-b3 (b4 在 test_sets 里单独列出)
    - data/preprocessed/RWTH          # NMC
    - data/preprocessed/SDU           # NMC
    - data/preprocessed/Stanford      # NMC
    - data/preprocessed/Tongji        # NMC
    - data/preprocessed/ISU-ILCC      # NCA
    - data/preprocessed/MICH          # NMC/NCA
    - data/preprocessed/CALB          # NMC（全寿命 SOH 由汇总表注入，见 augment_calb_soh.py）
    - data/preprocessed/XJTU          # NMC

  # 固定测试集，完全隔离，不参与训练和验证
  # level: L1=同化学同数据集跨批次, L2=同化学跨数据集(zero-shot 充放电协议),
  #        L3=锂离子跨正极, L4=跨离子体系
  test_sets:
    - dir: data/preprocessed/HUST
      pattern: "HUST_[89]-*.pkl"      # batch 8 & 9
      level: L1
    - dir: data/preprocessed/MATR
      pattern: "MATR_b4*.pkl"         # batch 4，zero-shot 充放电协议
      level: L2
    - dir: data/preprocessed/CALCE         # LCO
      level: L3
    - dir: data/preprocessed/HNEI          # NMC/LCO
      level: L3
    - dir: data/preprocessed/NAion         # 钠离子
      level: L4
    - dir: data/preprocessed/ZNion         # 锌离子
      level: L4
